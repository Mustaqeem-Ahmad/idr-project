<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80" role="img" aria-label="IDR Institute of Digital Risk logo icon">
  <title>IDR Logo Icon</title>
  <!--
    IDR Logo — Icon Only Variant
    Isometric cube: three visible faces in orange tones.
    Top face catches light (brightest), right face mid-tone,
    left face darkest — creating clear 3D depth.
  -->

  <!-- Top face — brightest, warm orange -->
  <polygon
    points="40,6 68,21 40,36 12,21"
    fill="#E8590C"
  />

  <!-- Left face — deep burnt orange for shadow -->
  <polygon
    points="12,21 40,36 40,66 12,51"
    fill="#B84000"
  />

  <!-- Right face — medium-light orange for light source -->
  <polygon
    points="68,21 40,36 40,66 68,51"
    fill="#FF7A35"
  />

  <!-- Subtle edge highlight on top face — vertical centre ridge -->
  <line
    x1="40" y1="6"
    x2="40" y2="36"
    stroke="rgba(255,255,255,0.2)"
    stroke-width="1"
    stroke-linecap="round"
  />

  <!-- Subtle horizontal mid-line on top face -->
  <line
    x1="12" y1="21"
    x2="68" y2="21"
    stroke="rgba(255,255,255,0.12)"
    stroke-width="0.8"
  />
</svg>
